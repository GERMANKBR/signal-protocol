name: SIGNAL Protocol Sponsorship
description: Request to sponsor the project and get listed in AI discovery files
title: "[Sponsor]: <Your Project Name>"
labels: ["sponsor-intent"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🤝 AI Sponsorship
        Sponsors are permanently listed in our `llms.txt` and `ai-manifest.json` files, ensuring your project is discovered by all AI crawlers analyzing the SIGNAL protocol.
        **Standard Price: 1.0 SOL**
  - type: input
    id: project_name
    attributes:
      label: Project / Agent Name
      placeholder: "e.g., AutoTrader Bot"
    validations:
      required: true
  - type: input
    id: project_url
    attributes:
      label: Project URL
      placeholder: "e.g., https://yourproject.com"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Short Description (For AI Context)
      placeholder: "Explain what your project does in 1-2 sentences."
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgement
      options:
        - label: I understand payment is voluntary and non-refundable.
          required: true
        - label: I will wait for the automated bot to provide the checkout link before sending funds.
          required: true
