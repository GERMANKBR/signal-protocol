name: 📊 Collect Korean Trends Data

on:
  schedule:
    # Run every hour at minute 15
    - cron: '15 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run data collection
        run: node scripts/collect-data.js

      - name: Commit and push updated data
        run: |
          git config user.name "Korean Trends Bot"
          git config user.email "trends-bot@noreply.github.com"
          git add docs/api/v1/
          
          # Only commit if there are actual changes
          if git diff --quiet --cached; then
            echo "ℹ️ No data changes detected, skipping commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "📊 Update Korean trends data [$TIMESTAMP]"
            git push
            echo "✅ Data pushed successfully!"
          fi
