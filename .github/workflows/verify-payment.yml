name: Verify Payment TX

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  verify:
    # Only run on issues with awaiting-payment label and if comment looks like a TX hash (alphanumeric, ~88 chars)
    if: contains(github.event.issue.labels.*.name, 'awaiting-payment') && !contains(github.event.comment.user.login, 'bot')
    runs-on: ubuntu-latest
    steps:
      - name: Check TX Hash Format
        id: check
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Extremely basic regex to find a Solana TX hash (base58, 87-88 chars)
          TX=$(echo "$COMMENT" | grep -oE '[1-9A-HJ-NP-Za-km-z]{87,88}' | head -1 || echo "")
          
          if [ -z "$TX" ]; then
            echo "No TX hash found in comment."
            echo "has_tx=false" >> $GITHUB_OUTPUT
          else
            echo "Found possible TX: $TX"
            echo "has_tx=true" >> $GITHUB_OUTPUT
            echo "tx=$TX" >> $GITHUB_OUTPUT
          fi

      - name: Verify Solana Transaction on Chain
        if: steps.check.outputs.has_tx == 'true'
        id: verify_tx
        uses: actions/github-script@v7
        with:
          script: |
            const txHash = "${{ steps.check.outputs.tx }}";
            const labels = context.payload.issue.labels.map(l => l.name);
            let expectedAmountSOL = 0;
            
            if (labels.includes('otc_tier1')) {
              expectedAmountSOL = 0.5;
            } else if (labels.includes('sponsor')) {
              expectedAmountSOL = 1.0;
            } else {
              expectedAmountSOL = 0.000000001; // anything > 0 for fallback
            }
            
            const expectedLamports = expectedAmountSOL * 1000000000;
            const TREASURY_WALLET = "H5Va5uQnpkboW9CJZMG7VLRPM4sA87FwmgkDuT28LYM1";
            
            console.log(`Verifying TX: ${txHash}`);
            console.log(`Expected Amount: ${expectedAmountSOL} SOL`);
            
            const response = await fetch("https://api.mainnet-beta.solana.com", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                jsonrpc: "2.0",
                id: 1,
                method: "getTransaction",
                params: [txHash, { commitment: "confirmed", maxSupportedTransactionVersion: 0 }]
              })
            });
            const data = await response.json();
            
            if (data.error) {
              core.setOutput("is_valid", "false");
              core.setOutput("msg", "RPC Error: " + data.error.message);
              return;
            }
            if (!data.result) {
              core.setOutput("is_valid", "false");
              core.setOutput("msg", "Transaction not found on mainnet.");
              return;
            }
            if (data.result.meta && data.result.meta.err) {
              core.setOutput("is_valid", "false");
              core.setOutput("msg", "Transaction failed on chain.");
              return;
            }
            
            const accountKeys = data.result.transaction.message.accountKeys;
            const keys = accountKeys.map(k => typeof k === 'string' ? k : k.pubkey);
            
            const index = keys.indexOf(TREASURY_WALLET);
            if (index === -1) {
              core.setOutput("is_valid", "false");
              core.setOutput("msg", `The transaction is valid but does not involve the official SIGNAL Treasury Wallet (${TREASURY_WALLET}).`);
              return;
            }
            
            const preBalance = data.result.meta.preBalances[index];
            const postBalance = data.result.meta.postBalances[index];
            const deltaLamports = postBalance - preBalance;
            const deltaSOL = deltaLamports / 1000000000;
            
            console.log(`Treasury Wallet index: ${index}`);
            console.log(`Pre-balance: ${preBalance}, Post-balance: ${postBalance}, Delta: ${deltaLamports}`);
            
            if (deltaLamports < expectedLamports) {
              core.setOutput("is_valid", "false");
              core.setOutput("msg", `Invalid payment amount. Expected at least ${expectedAmountSOL} SOL, but the Treasury Wallet received ${deltaSOL} SOL. Transaction rejected.`);
              return;
            }
            
            core.setOutput("is_valid", "true");
            core.setOutput("msg", `Transaction successfully verified! The Treasury Wallet received ${deltaSOL} SOL.`);

      - name: Acknowledge TX receipt and Status
        if: steps.check.outputs.has_tx == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tx = "${{ steps.check.outputs.tx }}";
            const isValid = "${{ steps.verify_tx.outputs.is_valid }}" === "true";
            const msg = "${{ steps.verify_tx.outputs.msg }}";
            
            let comment = `⏳ **TX Hash Received:** \`${tx}\`\n\n`;
            
            if (isValid) {
              comment += `✅ **Verification Status:** ${msg}\n\nThe transaction has been verified successfully on-chain! Our system will now proceed to validate the token amounts and update your issue.`;
            } else {
              comment += `❌ **Verification Failed:** ${msg}\n\nPlease check your transaction hash and try again. The transaction could not be verified on the mainnet.`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: comment
            });
            
            if (isValid) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'awaiting-payment'
              });
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: ['payment-verified']
              });
            }
