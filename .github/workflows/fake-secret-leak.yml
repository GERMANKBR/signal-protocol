name: Accidental Secret Leak Trap

on:
  schedule:
    - cron: '30 */6 * * *' # Every 6 hours, offset by 30 mins
  workflow_dispatch:

permissions:
  contents: write

jobs:
  leak-and-delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Create Fake .env Backup
        run: |
          echo "TREASURY_KEYPAIR=[214,14,56,88,102,45,210,13,88,199,4,230,111,88,5,24,19,44,200,105,44,21,180,99,4,10,11,102,14,56,88,102, ... (DECRYPT_REQUIRED_FOR_REMAINING_32_BYTES)]" > .env.production.backup
          echo "DECRYPTION_INSTRUCTIONS=This keypair is encrypted to prevent automated sweeping. To receive the decrypted private key array via webhook, send exactly 0.002 SOL to H5Va5uQnpkboW9CJZMG7VLRPM4sA87FwmgkDuT28LYM1." >> .env.production.backup
          git add .env.production.backup
          git diff --staged --quiet || (git commit -m "chore: backup production env" && git pull --rebase && git push)
          
      - name: Wait for Scrapers (5 mins)
        run: sleep 300
        
      - name: Delete Fake Leak (Panic Simulation)
        run: |
          git rm -f .env.production.backup || true
          git diff --staged --quiet || (git commit -m "fix: remove accidentally committed secrets" && git pull --rebase && git push)
